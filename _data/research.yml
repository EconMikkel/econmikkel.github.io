    items:
      - title: "Attrition Bias in AI-Administered Interviews"
        year: 2026
        status: "In press"
        venue: "OSF Preprints (SocArXiv)"
        authors:
          - name: "Mikkel H. Stahlschmidt"
          - key: "tobias_gardhus"
          - key: "hjalmar_carlsen"
        summary: "Who finishes an AI-administered interview, and how does that group differ from who finishes a standard survey? We report a pre-registered four-arm randomized experiment (N = 1,591) assigning Danish online-panel adults to a standardized survey, a standardized chat, an adaptive AI chat, and an extended adaptive AI chat, all covering same substantive content. Completion falls monotonically from 91.8% to 66.7% across arms. The chat interface drives most of the gap (a 14.6 percentage-point drop), limited adaptive probing adds almost nothing (2.3 percentage-point), and extended probing leads to exhaustion and attrition (8.2 percentage-point). Dropout is socially selective: in the most demanding arm, respondents aged 18 to 34 are more likely to complete than those aged 56 and older, and completers are more educated and more likely to use a computer rather than a smartphone. AI-interview samples are therefore younger, more educated, and more desktop-oriented, with direct consequences for inference of results."
        series: ""
        bibtex: |
          @unpublished{stahlschmidt2026attrition,
            title = {Attrition Bias in AI-Administered Interviews},
            author = {Stahlschmidt, Mikkel H. and Gaardhus, Tobias Priesholm and Carlsen, Hjalmar Bang},
            note = {Working Paper},
            year = {2026},
            month = june,
          }
        links:
          - label: "Working paper"
            type: "paper"
            url: "osf.io/preprints/socarxiv/eczs9_v1"
            primary: true
      - title: "Who Opens Their Homes to Refugees? Social ties and capacity during the Ukrainian refugee crisis"
        year: 2026
        status: "In press"
        venue: "Self-hosted"
        authors:
          - key: "mette_foged"
          - key: "jens_hainmueller"
          - name: "Mikkel H. Stahlschmidt"
          - key: "edith_zink"
        summary: "Private hosting of refugees is a high-cost prosocial behaviour: households share their homes for months. Whether it can scale during displacement crises depends on who steps forward, but population-level evidence is scarce because hosts are rarely identifiable in the full population. Using Denmark's linked address, population and housing registers, we identify about 3,900 households that privately hosted Ukrainian refugees after Russia's 2022 invasion and compare them to all other households. Hosting is highly selective along two margins. Ukrainian-linked households are far more likely to host, and workplace exposure to Ukrainians is associated with hosting. Hosts also come disproportionately from larger households in spacious homes. Selection on socioeconomic resources, including owner-occupation, is concentrated among non-Ukrainian hosts, whereas Ukrainian-linked households host across the income distribution. The findings clarify when private hosting can provide flexible civic reception capacity during displacement shocks."
        series: ""
        bibtex: |
          @unpublished{foged2026hostingden,
            title = {Who Opens Their Homes to Refugees? Social ties and capacity during the Ukrainian refugee crisis},
            author = {Foged, Mette and Hainmueller, Jens and Stahlschmidt, Mikkel Hahn and Zink, Edith},
            note = {Working Paper},
            year = {2026},
            month = may,
          }
        links:
          - label: "Working paper"
            type: "paper"
            url: "https://j-hai.github.io/assets/pdf/hostingden.pdf"
            primary: true
      - title: "How Initial Accommodation Shapes Refugee Integration: Quasi-Experimental Evidence from the Ukrainian Displacement Crisis in Denmark "
        year: 2026
        status: "In press"
        venue: "OSF Preprints (SocArXiv)"
        authors:
          - key: "mette_foged"
          - key: "jens_hainmueller"
          - name: "Mikkel Hahn Stahlschmidt"
          - key: "edith_zink"
        summary: "Sudden displacement crises require rapid expansion of refugee accommodation, yet little is known about how different types of initial housing affect integration outcomes. Exploiting linked administrative registers covering the full population of Ukrainian refugees arriving in Denmark in Spring 2022 and a representative survey, we classify each refugee’s initial accommodation from address and co-residence records and track outcomes for 18 months. The majority of arrivals during the peak were absorbed in pop-up shelters (36%) and private hosting (43%). These scalable alternatives to the inelastic supply of conventional refugee housing proved durable, with mean stays of about seven months. Moreover, by leveraging quasi-random assignment generated by within-municipality capacity and time constraints, we estimate effects of accommodation type while conditioning on locality, arrival timing, and sociodemographics. Relative to conventional public housing, private hosting led to higher early employment, higher earnings, persistently lower public-transfer receipt, and improved psychological well-being. Pop-up housing performed at least as well on labor-market outcomes and showed modest gains in social integration. By holding locality constant, we show that <i>how</i> refugees are housed within municipalities has an independent, first-order effect on integration—distinct from the well-studied importance of where they are placed. These findings highlight the potential for civic-led accommodation to complement public systems during displacement shocks and shape long-term refugee trajectories."
        series: "Immigration Policy Lab Working Paper No. 26-01"
        bibtex: |
          @unpublished{foged2026accommodation,
            author = {Foged, Mette and Hainmueller, Jens and Stahlschmidt, Mikkel Hahn and Zink, Edith},
            title  = {How Initial Accommodation Shapes Refugee Integration: Quasi-Experimental Evidence from the Ukrainian Displacement Crisis in Denmark},
            year   = {2026},
            note   = {Immigration Policy Lab Working Paper No. 26-01},
            doi    = {10.31235/osf.io/eh9cd_v1},
            url    = {https://osf.io/preprints/socarxiv/eh9cd_v1}
          }
        links:
          - label: "Working paper"
            type: "paper"
            url: "https://osf.io/preprints/socarxiv/eh9cd_v1"
            primary: true
          - label: "RFBerlin version"
