      - title: "What do we gain (and lose) from responsive questions? Comparing open-ended survey questions with adaptive probes from an AI interviewer"
        year: 2026
        status: "Pre-registered project"
        venue: "Open Science Framework"
        authors:
          - key: "hjalmar_carlsen"
          - key: "tobias_gardhus"
          - name: "Mikkel Stahlschmidt"
        summary: "This study examines how interface- and adaptiveness changes the quality of data generated from semi-structured interviews. In a randomized controlled trial with approximately 800 to 1200 adults, respondents are asked to reflect on the deservingness of strangers in need using five core items based on the CARIN framework. Participants are assigned to one of four treatment arms, or interview modes: a standard survey, a standardized chat interface, an AI interviewer with one adaptive follow-up, or an AI interviewer with multiple adaptive follow-ups. This design isolates the effects of interface and adaptiveness of the interviewer. Comparing arm 1 and 2, we can estimate the effect of interface, and comparing and 2, 3 and 4 we can estimate the effect of adaptiveness of the interviewer. We create several outcome measures to capture the various factors that impact the overall assessment of the quality of the interview data. We present pre-specified hypotheses we intend to examine and test statistically."
        bibtex: |
          @unpublished{carlsen2026responsive,
            author = {Carlsen, Hjalmar Alexander Bang and G\aa rdhus, Tobias Priesholm and Stahlschmidt, Mikkel},
            title  = {What Do We Gain (and Lose) from Responsive Questions? {C}omparing Open-Ended Survey Questions with Adaptive Probes from an {AI} Interviewer},
            year   = {2026},
            note   = {Pre-registered project, Open Science Framework},
            url    = {https://osf.io/3xkht/overview}
          }
        links:
          - label: "Pre-registration"
            type: "preregistration"
            url: "https://osf.io/3xkht/overview"
      - title: "The Moral Salience of Deservingness in Evaluative and Experiential Moral Reasoning: A Multilevel AI-Interview Experiment"
        year: 2026
        status: "Pre-registered project"
        venue: "Open Science Framework"
        authors:
          - key: "hjalmar_carlsen"
          - key: "tobias_gardhus"
          - name: "Mikkel Stahlschmidt"
        summary: "This project examines whether deservingness considerations become more morally salient when individuals reflect on a completed act of helping (Experiential condition) rather than evaluate helping prospectively (Evaluative framing). Drawing on the CARIN framework, which identifies Control, Attitude, Reciprocity, Identity, and Need as core criteria structuring deservingness judgments, the study tests whether moral reasoning shifts when helping becomes self-relevant. We implement a randomized controlled design using AI-administered semi-structured interviews with a Danish sample of 400 to 600 respondents. Participants are randomly assigned to either an evaluative condition, where they consider whether to help a stranger who violates a CARIN principle, or an experiential condition, where they reflect on having helped such a person. Each respondent evaluates all five CARIN dimensions, generating within-person variation across dimensions. Outcomes include a coded measure of the moral importance assigned to each criterion, indicators of injustice and exploitation language, and measures of within-person salience dispersion and decisiveness. The study estimates causal effects of framing on moral reasoning and contributes to research on deservingness, moral emotions, and the situational structure of helping norms."
        bibtex: |
          @unpublished{carlsen2026moral,
            author = {Carlsen, Hjalmar Alexander Bang and G\aa rdhus, Tobias Priesholm and Stahlschmidt, Mikkel},
            title  = {The Moral Salience of Deservingness in Evaluative and Experiential Moral Reasoning: {A} Multilevel {AI}-Interview Experiment},
            year   = {2026},
            note   = {Pre-registered project, Open Science Framework},
            url    = {https://osf.io/qakfd/overview}
          }
        links:
          - label: "Pre-registration"
            type: "preregistration"
            url: "https://osf.io/qakfd/overview"

