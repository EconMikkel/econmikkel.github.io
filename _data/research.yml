    items:
      - title: "How Initial Accommodation Shapes Refugee Integration: Quasi-Experimental Evidence from the Ukrainian Displacement Crisis in Denmark "
        year: 2026
        status: "In press"
        venue: "ROCKWOOL Foundation Berlin working paper"
        authors:
          - key: "mette_foged"
          - key: "jens_hainmueller"
          - name: "Mikkel Stahlschmidt"
          - key: "edith_zink"
        summary: "Sudden displacement crises strain reception systems and require rapid expansion of refugee accommodation beyond conventional channels. We study Denmark’s 2022 reception of Ukrainian refugees and provide the first population-level analysis of two scalable strategies that expanded capacity outside standard public refugee housing: public “pop-up” shelters and private hosting in residents’ homes. Using linked administrative registers covering the full arriving population, combined with a representative refugee survey, we classify each refugee’s initial accommodation from address and co-residence records and track outcomes for 18 months. The majority of arrivals was absorbed in pop-up shelters (37%) and private hosting (43%). Both proved durable, with mean stays of about seven months and no indication that private hosting was less stable. Exploiting quasi-random assignment generated by within-municipality capacity and time constraints, we estimate effects of accommodation type while conditioning on locality, arrival timing, and sociodemographics. Relative to conventional public housing, private hosting led to higher early employment, higher earnings, persistently lower public-transfer receipt, and improved psychological well-being. Pop-up housing performed at least as well on labor-market outcomes and showed modest gains in social integration. By holding locality constant, we show that how refugees are housed within municipalities has an independent, first-order effect on integration—distinct from the well-studied importance of where they are placed. These findings highlight the potential for civic-led accommodation to complement public systems during displacement shocks and shape long-term refugee trajectories."
        links:
          - label: "Working paper"
            type: "paper"
            url: "https://www.rfberlin.com/network-paper/how-initial-accommodation-shapes-refugee-integration-quasi-experimental-evidence-from-the-ukrainian-displacement-crisis-in-denmark/"
      - title: "What do we gain (and lose) from responsive questions? Comparing open-ended survey questions with adaptive probes from an AI interviewer"
        year: 2026
        status: "Pre-registered project"
        venue: "Open Science Framework"
        authors:
          - key: "hjalmar_carlsen"
          - key: "tobias_gardhus"
          - name: "Mikkel Stahlschmidt"
        summary: "This study examines how interface- and adaptiveness changes the quality of data generated from semi-structured interviews. In a randomized controlled trial with approximately 800 to 1200 adults, respondents are asked to reflect on the deservingness of strangers in need using five core items based on the CARIN framework. Participants are assigned to one of four treatment arms, or interview modes: a standard survey, a standardized chat interface, an AI interviewer with one adaptive follow-up, or an AI interviewer with multiple adaptive follow-ups. This design isolates the effects of interface and adaptiveness of the interviewer. Comparing arm 1 and 2, we can estimate the effect of interface, and comparing and 2, 3 and 4 we can estimate the effect of adaptiveness of the interviewer. We create several outcome measures to capture the various factors that impact the overall assessment of the quality of the interview data. We present pre-specified hypotheses we intend to examine and test statistically."
        links:
          - label: "Pre-registration"
            type: "preregistration"
            url: "https://osf.io/3xkht/overview"
      - title: "The Moral Salience of Deservingness in Evaluative and Experiential Moral Reasoning: A Multilevel AI-Interview Experiment"
        year: 2026
        status: "Pre-registered project"
        venue: "Open Science Framework"
        authors:
          - key: "hjalmar_carlsen"
          - key: "tobias_gardhus"
          - name: "Mikkel Stahlschmidt"
        summary: "This project examines whether deservingness considerations become more morally salient when individuals reflect on a completed act of helping (Experiential condition) rather than evaluate helping prospectively (Evaluative framing). Drawing on the CARIN framework, which identifies Control, Attitude, Reciprocity, Identity, and Need as core criteria structuring deservingness judgments, the study tests whether moral reasoning shifts when helping becomes self-relevant. We implement a randomized controlled design using AI-administered semi-structured interviews with a Danish sample of 400 to 600 respondents. Participants are randomly assigned to either an evaluative condition, where they consider whether to help a stranger who violates a CARIN principle, or an experiential condition, where they reflect on having helped such a person. Each respondent evaluates all five CARIN dimensions, generating within-person variation across dimensions. Outcomes include a coded measure of the moral importance assigned to each criterion, indicators of injustice and exploitation language, and measures of within-person salience dispersion and decisiveness. The study estimates causal effects of framing on moral reasoning and contributes to research on deservingness, moral emotions, and the situational structure of helping norms."
        links:
          - label: "Pre-registration"
            type: "preregistration"
            url: "https://osf.io/qakfd/overview"
      - title: "Networks, Neighborhoods, and New Beginnings: Evidence on Refugee Labor Market Entry from Local Housing Allocation in Sweden"
        year: 2026
        status: "Working paper"
        venue: "Institute for Policy Research discussion paper"
        authors:
          - name: "Katja Kaj"
          - name: "Bente Bent"
        summary: "FAKE TEST PAPER - Refugee reception systems often assign newly arrived individuals to local housing under severe capacity constraints, with lasting consequences for economic and social integration. We study how initial neighborhood placement shapes early labor market entry among refugees arriving in Sweden between 2018 and 2024. Using linked administrative records on housing assignments, employment, earnings, education enrollment, and family composition, we follow refugees from arrival through the first two years after settlement. We combine rich location data with institutional detail on municipal allocation procedures to identify plausibly exogenous variation in initial placement across neighborhoods within the same local labor market. Relative to placement in lower employment neighborhoods, assignment to areas with stronger labor demand and denser co-ethnic networks increases employment and earnings within the first year, with particularly large effects for women and for refugees with school-age children. We show that these gains are not driven solely by mobility after placement; instead, early access to local information, job referrals, and public services appears to play a central role. The results indicate that fine-grained housing allocation decisions shape integration trajectories in ways that persist beyond the immediate reception period."
        links:
          - label: "Working paper"
            type: "paper"
            url: "https://example.org/working-paper/refugee-labor-market-entry-sweden"

