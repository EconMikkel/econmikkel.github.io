locale: "en-US"
site_theme: "default"
title: "Mikkel Stahlschmidt"
name: &name "Mikkel Stahlschmidt"
description: &description "Research, working papers, and notes by Mikkel Stahlschmidt."
url: "https://econmikkel.github.io"
baseurl: ""
repository: "econmikkel/econmikkel.github.io"

author:
  avatar: "profile.jpg"
  name: "Mikkel Stahlschmidt"
  bio: "PhD student at the Department of Economics, University of Copenhagen, and the ROCKWOOL Foundation Interventions Unit."
  employer: "University of Copenhagen and ROCKWOOL Foundation Interventions Unit"
  location: "Copenhagen, Denmark"
  email: "mis@rfintervention.dk"
  cv: "CV__English.pdf"
  googlescholar: "https://scholar.google.com/citations?user=VfLh5XEAAAAJ"
  orcid: "https://orcid.org/0009-0007-2392-6470"
  bluesky: "mstahlschmidt.bsky.social"

teaser:
breadcrumbs: false
words_per_minute: 180
future: false
read_more: "disabled"
atom_feed:
  hide: true

twitter:
  username: &twitter
facebook:
  username:
  app_id:
  publisher:
og_image:
social:
  type: "Person"
  name: "Mikkel Stahlschmidt"
  links:
    - "https://scholar.google.com/citations?user=VfLh5XEAAAAJ"
    - "https://orcid.org/0009-0007-2392-6470"

include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules
  - tmp
  - vendor
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "<!--more-->"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  smart_quotes: lsquo,rsquo,ldquo,rdquo

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: false
      related: false
      categories:
        - notes
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Europe/Copenhagen

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
