<div class="page__footer-copyright footer-shell">
  <p class="footer__identity">{{ site.author.name }}</p>
  <p class="footer__links">
    <a href="mailto:{{ site.author.email }}">Email</a>
    <a href="{{ '/files/' | append: site.author.cv | relative_url }}">CV</a>
    <a href="{{ site.author.googlescholar }}">Google Scholar</a>
    <a href="{{ site.author.orcid }}">ORCID</a>
  </p>
  <p class="footer__meta">Research, working papers, and notes. Last updated {{ "now" | date: "%Y-%m-%d" }}.</p>
</div>
