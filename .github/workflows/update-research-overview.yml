name: Update Research Overview PDF

on:
  push:
    branches:
      - master
    paths:
      - "_data/research.yml"
      - "_data/coauthors.yml"
      - "_config.yml"
      - "scripts/generate_research_overview.py"
      - ".github/workflows/update-research-overview.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependency
        run: python -m pip install pyyaml

      - name: Generate research overview PDF
        shell: powershell
        run: python scripts\generate_research_overview.py

      - name: Commit updated PDF and source
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add files/research-overview.pdf files/research-overview.tex
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update research overview PDF"
            git push
          }
